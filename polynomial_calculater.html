<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polynomial Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #1d2433;
      background:
        radial-gradient(circle at top left, rgba(48, 141, 255, 0.24), transparent 32rem),
        linear-gradient(135deg, #f5f7fb 0%, #e8eef7 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(920px, 100%);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dfec;
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(22, 36, 61, 0.16);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: #1d3557;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      letter-spacing: 0;
    }

    .content {
      display: grid;
      gap: 20px;
      padding: 24px;
    }

    .panel {
      display: grid;
      gap: 12px;
    }

    label {
      font-weight: 700;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 44px;
      border-radius: 6px;
      font: inherit;
    }

    input,
    select {
      border: 1px solid #b7c2d3;
      padding: 10px 12px;
      background: white;
      color: #1d2433;
    }

    button {
      border: 0;
      padding: 10px 16px;
      font-weight: 700;
      color: white;
      background: #287271;
      cursor: pointer;
    }

    button:hover {
      background: #205d5c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .result {
      min-height: 96px;
      border: 1px solid #cfd8e6;
      border-radius: 8px;
      padding: 16px;
      background: #f8fafd;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .error {
      color: #a83232;
      font-weight: 700;
    }

    .hint {
      margin: 0;
      color: #526070;
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .content,
      header {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Polynomial Calculator</h1>
    </header>

    <section class="content" aria-label="Polynomial calculator">
      <p class="hint">Enter coefficients from highest degree to constant term. Example: 2x^3 - 4x + 7 is 2, 0, -4, 7.</p>

      <div class="grid">
        <div class="panel">
          <label for="firstPolynomial">First polynomial</label>
          <input id="firstPolynomial" type="text" value="2, 0, -4, 7">
        </div>

        <div class="panel">
          <label for="secondPolynomial">Second polynomial</label>
          <input id="secondPolynomial" type="text" value="1, 3, 2">
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <label for="operation">Operation</label>
          <select id="operation">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="multiply">Multiply</option>
            <option value="derivative">Derivative of first polynomial</option>
          </select>
        </div>

        <div class="panel">
          <label for="xValue">Evaluate first polynomial at x</label>
          <input id="xValue" type="number" value="2" step="any">
        </div>
      </div>

      <button id="calculateButton" type="button">Calculate</button>

      <div id="result" class="result" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const firstInput = document.getElementById("firstPolynomial");
    const secondInput = document.getElementById("secondPolynomial");
    const operationInput = document.getElementById("operation");
    const xInput = document.getElementById("xValue");
    const resultBox = document.getElementById("result");
    const calculateButton = document.getElementById("calculateButton");

    function parsePolynomial(value) {
      const coefficients = value
        .split(",")
        .map((part) => part.trim())
        .filter(Boolean)
        .map(Number);

      if (coefficients.length === 0 || coefficients.some(Number.isNaN)) {
        throw new Error("Please enter coefficients as numbers separated by commas.");
      }

      return trimLeadingZeroes(coefficients);
    }

    function trimLeadingZeroes(coefficients) {
      const firstNonZero = coefficients.findIndex((number) => number !== 0);
      return firstNonZero === -1 ? [0] : coefficients.slice(firstNonZero);
    }

    function padStart(coefficients, length) {
      return Array(length - coefficients.length).fill(0).concat(coefficients);
    }

    function addPolynomials(first, second) {
      const length = Math.max(first.length, second.length);
      const left = padStart(first, length);
      const right = padStart(second, length);
      return trimLeadingZeroes(left.map((number, index) => number + right[index]));
    }

    function subtractPolynomials(first, second) {
      const length = Math.max(first.length, second.length);
      const left = padStart(first, length);
      const right = padStart(second, length);
      return trimLeadingZeroes(left.map((number, index) => number - right[index]));
    }

    function multiplyPolynomials(first, second) {
      const result = Array(first.length + second.length - 1).fill(0);

      first.forEach((firstCoefficient, firstIndex) => {
        second.forEach((secondCoefficient, secondIndex) => {
          result[firstIndex + secondIndex] += firstCoefficient * secondCoefficient;
        });
      });

      return trimLeadingZeroes(result);
    }

    function derivative(coefficients) {
      const degree = coefficients.length - 1;

      if (degree === 0) {
        return [0];
      }

      return trimLeadingZeroes(coefficients.slice(0, -1).map((coefficient, index) => {
        return coefficient * (degree - index);
      }));
    }

    function evaluatePolynomial(coefficients, xValue) {
      return coefficients.reduce((total, coefficient) => total * xValue + coefficient, 0);
    }

    function formatPolynomial(coefficients) {
      if (coefficients.every((coefficient) => coefficient === 0)) {
        return "0";
      }

      const degree = coefficients.length - 1;

      return coefficients
        .map((coefficient, index) => {
          if (coefficient === 0) {
            return "";
          }

          const power = degree - index;
          const sign = coefficient < 0 ? "-" : "+";
          const absolute = Math.abs(coefficient);
          const coefficientText = absolute === 1 && power > 0 ? "" : absolute.toString();
          const variableText = power === 0 ? "" : power === 1 ? "x" : `x^${power}`;

          return `${sign} ${coefficientText}${variableText}`.trim();
        })
        .filter(Boolean)
        .join(" ")
        .replace(/^\+ /, "");
    }

    function calculate() {
      try {
        const first = parsePolynomial(firstInput.value);
        const operation = operationInput.value;
        const second = operation === "derivative" ? [0] : parsePolynomial(secondInput.value);
        const xValue = Number(xInput.value);

        if (Number.isNaN(xValue)) {
          throw new Error("Please enter a valid number for x.");
        }

        let operationResult;

        if (operation === "add") {
          operationResult = addPolynomials(first, second);
        } else if (operation === "subtract") {
          operationResult = subtractPolynomials(first, second);
        } else if (operation === "multiply") {
          operationResult = multiplyPolynomials(first, second);
        } else {
          operationResult = derivative(first);
        }

        resultBox.classList.remove("error");
        resultBox.innerHTML = `
          <strong>First:</strong> ${formatPolynomial(first)}<br>
          <strong>Second:</strong> ${formatPolynomial(second)}<br>
          <strong>Result:</strong> ${formatPolynomial(operationResult)}<br>
          <strong>First at x = ${xValue}:</strong> ${evaluatePolynomial(first, xValue)}
        `;
      } catch (error) {
        resultBox.classList.add("error");
        resultBox.textContent = error.message;
      }
    }

    calculateButton.addEventListener("click", calculate);
    operationInput.addEventListener("change", calculate);
    calculate();
  </script>
</body>
</html>
